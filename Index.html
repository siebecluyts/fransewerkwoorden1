<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De Ultieme Franse Werkwoorden Typ-Quiz met Modules</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .quiz-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 650px;
            width: 100%;
        }
        h1 { color: #2c3e50; margin-bottom: 5px; font-size: 24px; }
        p.subtitle { color: #7f8c8d; font-size: 14px; margin-top: 0; margin-bottom: 20px; }
        
        /* Module selector styling */
        .module-selection {
            background-color: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
            text-align: left;
        }
        .module-selection h3 { margin: 0 0 10px 0; font-size: 14px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            font-size: 14px;
            color: #334155;
            cursor: pointer;
            font-weight: 600;
        }
        .checkbox-label input { margin-right: 8px; transform: scale(1.1); }

        .word-to-translate { font-size: 30px; font-weight: bold; color: #2980b9; margin: 20px 0; }
        input[type="text"] {
            width: 90%;
            padding: 14px;
            font-size: 18px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            outline: none;
            text-align: center;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus { border-color: #2980b9; }
        .btn-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        button {
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 95%;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        #submit-btn { background-color: #2ecc71; }
        #end-btn { background-color: #e74c3c; }
        .feedback { font-size: 18px; font-weight: bold; margin-top: 20px; min-height: 24px; }
        .correct { color: #2ecc71; }
        .wrong { color: #e74c3c; }
        .score { font-size: 15px; color: #7f8c8d; margin-top: 15px; font-weight: 500; }
        
        /* Resultaten scherm styling */
        .results-box {
            text-align: left;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #ecf0f1;
        }
        .results-box h2 { color: #2c3e50; font-size: 20px; margin-bottom: 5px; }
        .error-list {
            list-style-type: none;
            padding: 0;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid #ecf0f1;
            border-radius: 6px;
        }
        .error-list li {
            padding: 10px;
            background-color: #fdf2f2;
            border-bottom: 1px solid #f9e2e2;
            border-left: 4px solid #e74c3c;
            font-size: 14px;
        }
        .error-list li:last-child { border-bottom: none; }
        .focus-advice {
            background-color: #e8f4f8;
            padding: 15px;
            border-left: 4px solid #3498db;
            border-radius: 4px;
            margin-top: 15px;
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Franse Werkwoorden Oefenen</h1>
    <p class="subtitle">Selecteer je modules en druk op Enter om te controleren.</p>
    
    <div class="module-selection" id="module-selector-box">
        <h3>Kies welke modules je wilt oefenen:</h3>
        <div class="checkbox-group">
            <label class="checkbox-label"><input type="checkbox" value="1" checked onchange="updateActiveWords()"> Module 1</label>
            <label class="checkbox-label"><input type="checkbox" value="2" checked onchange="updateActiveWords()"> Module 2</label>
            <label class="checkbox-label"><input type="checkbox" value="3" checked onchange="updateActiveWords()"> Module 3</label>
            <label class="checkbox-label"><input type="checkbox" value="4" checked onchange="updateActiveWords()"> Module 4</label>
            <label class="checkbox-label"><input type="checkbox" value="5" checked onchange="updateActiveWords()"> Module 5</label>
            <label class="checkbox-label"><input type="checkbox" value="6" checked onchange="updateActiveWords()"> Module 6</label>
        </div>
    </div>

    <div id="quiz-area">
        <div class="score">Goed: <span id="score-count">0</span> | Totaal behandeld: <span id="total-count">0</span></div>
        <div class="word-to-translate" id="dutch-word">Laden...</div>
        
        <input type="text" id="user-input" placeholder="Typ het Franse werkwoord..." autocomplete="off">
        <br>
        <div class="btn-container">
            <button id="submit-btn" onclick="handleAction()">Controleer</button>
            <button id="end-btn" onclick="endQuiz()">Stop & Toon Resultaten</button>
        </div>
        
        <div class="feedback" id="feedback-msg"></div>
    </div>
    
    <div id="results-area" class="results-box" style="display: none;">
        <h2>Jouw Resultaten 📊</h2>
        <p id="final-score"></p>
        <div id="focus-container" class="focus-advice"></div>
        <h3 id="errors-title" style="margin-top: 20px; font-size: 16px;">Foutjes om na te kijken:</h3>
        <ul id="error-list" class="error-list"></ul>
        <button onclick="location.reload()" style="background-color: #3498db; margin-top: 15px; width: 100%;">Opnieuw Oefenen</button>
    </div>
</div>

<script>
    // Alle werkwoorden netjes opgedeeld in de 6 modules volgens jouw lijst
    const allWords = [
        // MODULE 1
        { mod: 1, nl: "aankomen", fr: "arriver" }, { mod: 1, nl: "nemen", fr: "prendre" },
        { mod: 1, nl: "(op)kloppen", fr: "battre" }, { mod: 1, nl: "aankondigen", fr: "annoncer" },
        { mod: 1, nl: "eindigen", fr: "finir" }, { mod: 1, nl: "vertrekken", fr: "partir" },
        { mod: 1, nl: "antwoorden", fr: "répondre" }, { mod: 1, nl: "aanbieden", fr: "offrir" },
        { mod: 1, nl: "beklagen", fr: "plaindre" }, { mod: 1, nl: "groter worden", fr: "grandir" },
        { mod: 1, nl: "dienen, opdienen", fr: "servir" },

        // MODULE 2
        { mod: 2, nl: "beginnen", fr: "commencer" }, { mod: 2, nl: "begrijpen", fr: "comprendre" },
        { mod: 2, nl: "aandoen / plaatsen / leggen / zetten", fr: "mettre" }, { mod: 2, nl: "bereiken", fr: "atteindre" },
        { mod: 2, nl: "kiezen", fr: "choisir" }, { mod: 2, nl: "uitgaan, naar buiten gaan", fr: "sortir" },
        { mod: 2, nl: "bewegen", fr: "bouger" }, { mod: 2, nl: "dragen", fr: "porter" },
        { mod: 2, nl: "bedekken", fr: "couvrir" }, { mod: 2, nl: "beschermen", fr: "protéger" },
        { mod: 2, nl: "kloppen", fr: "frapper" }, { mod: 2, nl: "slapen", fr: "dormir" },

        // MODULE 3
        { mod: 3, nl: "bezoeken (iets)", fr: "visiter" }, { mod: 3, nl: "koken", fr: "cuisiner" },
        { mod: 3, nl: "beëindigen", fr: "terminer" }, { mod: 3, nl: "betekenen", fr: "signifier" },
        { mod: 3, nl: "nadenken", fr: "réfléchir" }, { mod: 3, nl: "voelen, ruiken", fr: "sentir" },
        { mod: 3, nl: "binnenkomen", fr: "entrer" }, { mod: 3, nl: "leren", fr: "apprendre" },
        { mod: 3, nl: "beloven", fr: "promettre" }, { mod: 3, nl: "creëren", fr: "créer" },
        { mod: 3, nl: "ontlenen", fr: "emprunter" }, { mod: 3, nl: "liegen", fr: "mentir" },

        // MODULE 4
        { mod: 4, nl: "blijven", fr: "rester" }, { mod: 4, nl: "naar beneden gaan", fr: "descendre" },
        { mod: 4, nl: "beschrijven", fr: "décrire" }, { mod: 4, nl: "delen", fr: "partager" },
        { mod: 4, nl: "opmerken", fr: "remarquer" }, { mod: 4, nl: "chatten", fr: "chatter" },
        { mod: 4, nl: "teruggeven", fr: "rendre" }, { mod: 4, nl: "breken", fr: "casser" },
        { mod: 4, nl: "doven / uitdoen", fr: "éteindre" }, { mod: 4, nl: "roepen", fr: "crier" },
        { mod: 4, nl: "dansen", fr: "danser" }, { mod: 4, nl: "verkopen", fr: "vendre" },
        { mod: 4, nl: "gebruiken", fr: "utiliser" }, { mod: 4, nl: "fotograferen", fr: "photographier" },
        { mod: 4, nl: "slagen", fr: "réussir" },

        // MODULE 5
        { mod: 5, nl: "verliezen", fr: "perdre" }, { mod: 5, nl: "gieten", fr: "verser" },
        { mod: 5, nl: "herdoen", fr: "refaire" }, { mod: 5, nl: "stappen", fr: "marcher" },
        { mod: 5, nl: "doen", fr: "faire" }, { mod: 5, nl: "wachten (op iem.)", fr: "attendre" },
        { mod: 5, nl: "herhalen", fr: "répéter" }, { mod: 5, nl: "trekken", fr: "tirer" },
        { mod: 5, nl: "dol zijn op", fr: "adorer" }, { mod: 5, nl: "lezen", fr: "lire" },
        { mod: 5, nl: "hopen", fr: "espérer" }, { mod: 5, nl: "verdikken", fr: "grossir" },
        { mod: 5, nl: "doorbrengen / passeren", fr: "passer" }, { mod: 5, nl: "lijden", fr: "souffrir" },
        { mod: 5, nl: "horen", fr: "entendre" }, { mod: 5, nl: "vermageren", fr: "maigrir" },

        // MODULE 6
        { mod: 6, nl: "duren", fr: "durer" }, { mod: 6, nl: "markeren", fr: "surligner" },
        { mod: 6, nl: "kopen", fr: "acheter" }, { mod: 6, nl: "eten", fr: "manger" },
        { mod: 6, nl: "versieren", fr: "décorer" }, { mod: 6, nl: "mengen", fr: "mélanger" },
        { mod: 6, nl: "lijken op", fr: "ressembler" }, { mod: 6, nl: "voeden", fr: "nourrir" },
        { mod: 6, nl: "gaan", fr: "aller" }, { mod: 6, nl: "ontdekken", fr: "découvrir" },
        { mod: 6, nl: "logeren", fr: "loger" }, { mod: 6, nl: "vullen", fr: "remplir" },
        { mod: 6, nl: "geven", fr: "donner" }, { mod: 6, nl: "ontvangen / verwelkomen", fr: "accueillir" },
        { mod: 6, nl: "ophangen", fr: "pendre" }, { mod: 6, nl: "waarschuwen", fr: "avertir" },
        { mod: 6, nl: "haten", fr: "détester" }, { mod: 6, nl: "openen", fr: "ouvrir" },
        { mod: 6, nl: "organiseren", fr: "organiser" }, { mod: 6, nl: "hebben", fr: "avoir" },
        { mod: 6, nl: "optillen", fr: "enlever" }, { mod: 6, nl: "proberen", fr: "essayer" },
        { mod: 6, nl: "helpen", fr: "aider" }, { mod: 6, nl: "samenvoegen / verbinden", fr: "joindre" },
        { mod: 6, nl: "houden van", fr: "aimer" }, { mod: 6, nl: "plukken", fr: "cueillir" },
        { mod: 6, nl: "schilderen", fr: "peindre" }, { mod: 6, nl: "huilen / wenen", fr: "pleurer" },
        { mod: 6, nl: "proeven", fr: "déguster" }, { mod: 6, nl: "kijken (naar iets)", fr: "regarder" },
        { mod: 6, nl: "schillen", fr: "éplucher" }, { mod: 6, nl: "transformeren", fr: "transformer" },
        { mod: 6, nl: "schoonmaken", fr: "nettoyer" }, { mod: 6, nl: "komen / terugkomen", fr: "venir" },
        { mod: 6, nl: "schrijven", fr: "écrire" }, { mod: 6, nl: "uitleggen", fr: "expliquer" },
        { mod: 6, nl: "kunnen / mogen", fr: "pouvoir" }, { mod: 6, nl: "smelten", fr: "fondre" },
        { mod: 6, nl: "uitspreken", fr: "prononcer" }, { mod: 6, nl: "luisteren (naar iem.)", fr: "écouter" },
        { mod: 6, nl: "snijden", fr: "couper" }, { mod: 6, nl: "maken", fr: "faire" },
        { mod: 6, nl: "toestaan", fr: "permettre" }, { mod: 6, nl: "volledig maken", fr: "compléter" },
        { mod: 6, nl: "moeten", fr: "devoir" }, { mod: 6, nl: "toevoegen", fr: "ajouter" },
        { mod: 6, nl: "voorbereiden", fr: "préparer" }, { mod: 6, nl: "onthouden", fr: "retenir" },
        { mod: 6, nl: "voorstellen", fr: "suggerer" }, { mod: 6, nl: "ontmoeten", fr: "rencontrer" },
        { mod: 6, nl: "voorverwarmen", fr: "préchauffer" }, { mod: 6, nl: "vrezen", fr: "craindre" },
        { mod: 6, nl: "ontvangen", fr: "recevoir" }, { mod: 6, nl: "wassen", fr: "laver" },
        { mod: 6, nl: "weggooien", fr: "jeter" }, { mod: 6, nl: "opladen", fr: "charger" },
        { mod: 6, nl: "zeggen", fr: "dire" }, { mod: 6, nl: "opruimen / ranger", fr: "ranger" },
        { mod: 6, nl: "plaatsen", fr: "placer" }, { mod: 6, nl: "praten", fr: "parler" },
        { mod: 6, nl: "rekenen / tellen", fr: "compter" }, { mod: 6, nl: "sluiten", fr: "fermer" },
        { mod: 6, nl: "spelen", fr: "jouer" }, { mod: 6, nl: "studeren", fr: "étudier" },
        { mod: 6, nl: "tekenen", fr: "dessiner" }, { mod: 6, nl: "terug naar huis gaan / rentrer", fr: "rentrer" },
        { mod: 6, nl: "terugkomen", fr: "revenir" }, { mod: 6, nl: "tonen", fr: "montrer" },
        { mod: 6, nl: "uitvinden", fr: "inventer" }, { mod: 6, nl: "uitwissen", fr: "effacer" },
        { mod: 6, nl: "vasthouden", fr: "tenir" }, { mod: 6, nl: "veranderen", fr: "changer" },
        { mod: 6, nl: "verbeteren", fr: "corriger" }, { mod: 6, nl: "vergeten", fr: "oublier" },
        { mod: 6, nl: "verhuizen", fr: "déménager" }, { mod: 6, nl: "verkiezen", fr: "préférer" },
        { mod: 6, nl: "verplaatsen", fr: "déplacer" }, { mod: 6, nl: "vertellen", fr: "raconter" },
        { mod: 6, nl: "vinden", fr: "trouver" }, { mod: 6, nl: "vragen", fr: "demander" },
        { mod: 6, nl: "werken", fr: "travailler" }, { mod: 6, nl: "weten", fr: "savoir" },
        { mod: 6, nl: "willen", fr: "vouloir" }, { mod: 6, nl: "winnen", fr: "gagner" },
        { mod: 6, nl: "wonen", fr: "habiter" }, { mod: 6, nl: "worden", fr: "devenir" },
        { mod: 6, nl: "zien", fr: "voir" }, { mod: 6, nl: "zijn", fr: "être" },
        { mod: 6, nl: "zingen", fr: "chanter" }, { mod: 6, nl: "zoeken", fr: "chercher" },
        { mod: 6, nl: "zwemmen", fr: "nager" }
    ];

    let activeWords = [];
    let currentWordIndex = 0;
    let score = 0;
    let total = 0;
    let isChecked = false;
    let wrongAnswers = [];

    const dutchWordEl = document.getElementById('dutch-word');
    const userInputEl = document.getElementById('user-input');
    const feedbackEl = document.getElementById('feedback-msg');
    const scoreEl = document.getElementById('score-count');
    const totalEl = document.getElementById('total-count');
    const btnEl = document.getElementById('submit-btn');

    function updateActiveWords() {
        const checkboxes = document.querySelectorAll('.checkbox-label input');
        let selectedModules = [];
        
        checkboxes.forEach(cb => {
            if (cb.checked) {
                selectedModules.push(parseInt(cb.value));
            }
        });

        activeWords = allWords.filter(word => selectedModules.includes(word.mod));

        if (activeWords.length === 0) {
            dutchWordEl.innerText = "Kies minstens 1 module!";
            userInputEl.disabled = true;
            btnEl.disabled = true;
        } else {
            userInputEl.disabled = false;
            btnEl.disabled = false;
            if (isChecked === false && feedbackEl.innerText === '') {
                nextWord();
            }
        }
    }

    function nextWord() {
        if (activeWords.length === 0) return;
        // Lock de module selector tijdens een lopende vraag om bugs te voorkomen
        document.querySelectorAll('.checkbox-label input').forEach(cb => cb.disabled = false);

        currentWordIndex = Math.floor(Math.random() * activeWords.length);
        dutchWordEl.innerHTML = `${activeWords[currentWordIndex].nl} <span style="font-size:14px; color:#94a3b8;">(Mod ${activeWords[currentWordIndex].mod})</span>`;
        userInputEl.value = '';
        feedbackEl.innerText = '';
        userInputEl.disabled = false;
        btnEl.innerText = "Controleer";
        btnEl.style.backgroundColor = "#2ecc71";
        isChecked = false;
        userInputEl.focus();
    }

    function handleAction() {
        if (isChecked) {
            nextWord();
        } else {
            if (activeWords.length > 0) checkAnswer();
        }
    }

    function checkAnswer() {
        // Blokkeer module wisselen tijdens feedback-status
        document.querySelectorAll('.checkbox-label input').forEach(cb => cb.disabled = true);

        const userAnswer = userInputEl.value.trim().toLowerCase();
        const correctAnswer = activeWords[currentWordIndex].fr.toLowerCase();

        total++;
        userInputEl.disabled = true;

        if (userAnswer === correctAnswer) {
            score++;
            feedbackEl.innerHTML = '<span class="correct">Helemaal juist! 🎉</span>';
        } else {
            feedbackEl.innerHTML = `<span class="wrong">Helaas! Het moest zijn: <strong>${activeWords[currentWordIndex].fr}</strong></span>`;
            wrongAnswers.push({
                nl: activeWords[currentWordIndex].nl,
                fr: activeWords[currentWordIndex].fr,
                mod: activeWords[currentWordIndex].mod,
                user: userAnswer || "(niets ingevuld)"
            });
        }

        scoreEl.innerText = score;
        totalEl.innerText = total;
        btnEl.innerText = "Druk op Enter voor het volgende woord";
        btnEl.style.backgroundColor = "#3498db";
        isChecked = true;
    }

    function endQuiz() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('module-selector-box').style.display = 'none';
        document.getElementById('results-area').style.display = 'block';

        document.getElementById('final-score').innerHTML = `Je hebt <strong>${score}</strong> van de <strong>${total}</strong> beantwoorde woorden goed!`;

        const errorListEl = document.getElementById('error-list');
        const errorsTitleEl = document.getElementById('errors-title');
        const focusContainer = document.getElementById('focus-container');

        errorListEl.innerHTML = '';

        if (wrongAnswers.length === 0 && total > 0) {
            errorsTitleEl.style.display = 'none';
            focusContainer.innerHTML = "<strong>Geweldig focus-advies:</strong> Foutloze score! Je kent de geselecteerde modules echt uitmuntend goed. Je kunt nu een extra module aanzetten om je grenzen te verleggen!";
        } else if (total === 0) {
            errorsTitleEl.style.display = 'none';
            focusContainer.innerHTML = "Je hebt nog geen woorden ingevuld. Start opnieuw en test je kennis!";
        } else {
            errorsTitleEl.style.display = 'block';
            wrongAnswers.forEach(item => {
                const li = document.createElement('li');
                li.innerHTML = `[Mod ${item.mod}] <strong>${item.nl}</strong><br>Jouw antwoord: <span style="text-decoration: line-through; color: #c0392b;">${item.user}</span> ➡️ Juist: <strong style="color: #27ae60;">${item.fr}</strong>`;
                errorListEl.appendChild(li);
            });

            let foutPercentage = (wrongAnswers.length / total) * 100;
            if (foutPercentage > 40) {
                focusContainer.innerHTML = "<strong>Focus-advies:</strong> Het lijkt erop dat deze combinatie nog iets te groot is. Zet bij de volgende ronde eens <strong>slechts 1 module tegelijk</strong> aan. Als je één module helemaal foutloos kent, voeg je pas de volgende module toe. Stap voor stap werkt het best!";
            } else {
                focusContainer.innerHTML = "<strong>Focus-advies:</strong> Goed bezig, je beheerst deze modules al bijna! Bekijk de lijst hieronder en let goed op de spelling en accenten van de woorden die je miste. Test jezelf nog één keer op dezelfde modules om voor de 100% te gaan.";
            }
        }
    }

    userInputEl.addEventListener("keyup", function(event) {
        if (event.key === "Enter") {
            handleAction();
        }
    });

    // Start setup
    updateActiveWords();
</script>

</body>
</html>
